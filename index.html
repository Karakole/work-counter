<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Mesurez le temps passé sur les projets de vos clients. 100% hors ligne, données stockées dans votre navigateur." />
  <title>Work Counter — Suivi du temps</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏱️</text></svg>" />
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">⏱</span>
      <div class="brand-text">
        <h1>Work Counter</h1>
        <p>Suivi du temps de travail</p>
      </div>
    </div>
    <div class="header-actions">
      <button id="exportBtn" class="btn btn-ghost" title="Exporter les données">
        <svg viewBox="0 0 24 24" class="icon"><path d="M12 3v12m0 0 4-4m-4 4-4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
        <span class="btn-label">Exporter</span>
      </button>
      <button id="importBtn" class="btn btn-ghost" title="Importer des données">
        <svg viewBox="0 0 24 24" class="icon"><path d="M12 15V3m0 0 4 4m-4-4-4 4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
        <span class="btn-label">Importer</span>
      </button>
      <input type="file" id="importInput" accept="application/json" hidden />
      <button id="themeBtn" class="btn btn-icon" title="Changer de thème" aria-label="Changer de thème">
        <svg viewBox="0 0 24 24" class="icon icon-sun"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4m11.4-11.4 1.4-1.4"/></svg>
        <svg viewBox="0 0 24 24" class="icon icon-moon"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
      </button>
    </div>
  </header>

  <main class="app-main">
    <section class="add-panel">
      <form id="addForm" class="add-form" autocomplete="off">
        <div class="field">
          <label for="clientInput">Client</label>
          <input type="text" id="clientInput" list="clientsList" placeholder="Nom du client" required />
          <datalist id="clientsList"></datalist>
        </div>
        <div class="field">
          <label for="projectInput">Projet</label>
          <input type="text" id="projectInput" placeholder="Nom du projet" required />
        </div>
        <button type="submit" class="btn btn-primary">
          <svg viewBox="0 0 24 24" class="icon"><path d="M12 5v14m-7-7h14"/></svg>
          Ajouter
        </button>
      </form>
    </section>

    <section id="summary" class="summary" hidden>
      <div class="summary-card">
        <span class="summary-label">Clients</span>
        <span class="summary-value" id="statClients">0</span>
      </div>
      <div class="summary-card">
        <span class="summary-label">Projets</span>
        <span class="summary-value" id="statProjects">0</span>
      </div>
      <div class="summary-card">
        <span class="summary-label">Temps total</span>
        <span class="summary-value" id="statTime">0h 00m</span>
      </div>
      <div class="summary-card summary-card--live" id="liveCard" hidden>
        <span class="summary-label">En cours</span>
        <span class="summary-value" id="statLive">0h 00m 00s</span>
      </div>
    </section>

    <section id="clients" class="clients"></section>

    <div id="emptyState" class="empty-state">
      <div class="empty-illustration">⏱</div>
      <h2>Aucun projet pour l'instant</h2>
      <p>Ajoutez un client et un projet ci-dessus pour démarrer votre premier compteur.</p>
    </div>
  </main>

  <footer class="app-footer">
    <p>Vos données restent dans ce navigateur. Pensez à exporter régulièrement.</p>
  </footer>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <template id="clientTemplate">
    <article class="client-card">
      <header class="client-head">
        <button class="client-toggle" aria-expanded="true">
          <svg viewBox="0 0 24 24" class="icon chevron"><path d="m9 18 6-6-6-6"/></svg>
          <span class="client-name"></span>
        </button>
        <div class="client-meta">
          <span class="client-total"></span>
          <button class="btn btn-icon btn-danger-ghost client-delete" title="Supprimer le client" aria-label="Supprimer le client">
            <svg viewBox="0 0 24 24" class="icon"><path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
          </button>
        </div>
      </header>
      <div class="project-list"></div>
      <form class="client-add" autocomplete="off">
        <input type="text" class="client-add-input" placeholder="Nouveau projet pour ce client…" required />
        <button type="submit" class="btn btn-ghost btn-add-project">
          <svg viewBox="0 0 24 24" class="icon"><path d="M12 5v14m-7-7h14"/></svg>
          <span class="btn-label">Projet</span>
        </button>
      </form>
    </article>
  </template>

  <template id="projectTemplate">
    <div class="project-item">
      <div class="project-row">
        <div class="project-info">
          <span class="project-name"></span>
          <button class="project-sessions" type="button" aria-expanded="false" title="Voir l'historique"></button>
        </div>
        <div class="project-timing">
          <span class="project-time"></span>
        </div>
        <div class="project-controls">
          <button class="btn btn-timer" title="Démarrer / Arrêter">
            <svg viewBox="0 0 24 24" class="icon icon-play"><path d="M6 4v16l14-8z"/></svg>
            <svg viewBox="0 0 24 24" class="icon icon-stop"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
            <span class="timer-label">Démarrer</span>
          </button>
          <button class="btn btn-icon btn-danger-ghost project-delete" title="Supprimer le projet" aria-label="Supprimer le projet">
            <svg viewBox="0 0 24 24" class="icon"><path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
          </button>
        </div>
      </div>
      <div class="project-history" hidden></div>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
